<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>CSS Properties</title>
  <style>
    <!--#6Changes the root size for the whole HTML-->
    html{
      font-size: 30px;
    }
    body {
      background-color: cornflowerblue;
      color: white;
      font-size: 18px;
    }
    /* Don't change the CSS above, add Your CSS below */
    /*1. Changes the font color to coral*/
    #color{
      color: coral;
    
    /*2. Changes the font size to 2x */}
    #Size{
      font-size: 2rem;
    }
    /*3. Changes Font weight to 900*/
    #Weight{
      font-weight: 900;
    }
    /*4. Changes that style of font */
    #Family{
     font-family: 'Caveat', cursive;
    }
    /*5. Changes the centering and move the text to the right */
    #Align{
      text-align: right;
    }
  </style>
</head>

<body>
  <h1>Important CSS Properties</h1>
  <p id="color">Color</p>
  <p id="Size">Font Size</p>
  <p id="Weight">Font Weight</p>
  <p id="Family">Font Family</p>
  <p id="Align">Text Align</p>
<!--^have to assign ID's, since all the attributes are <p>paragraph</p>
since we dont want to apply all the attributes to the paragraph elements. -->

</html>
